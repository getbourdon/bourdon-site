<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--paper); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 64px; border-radius: 8px; border: 1px solid var(--rule); }
  .meta { font-family: var(--font-mono); font-size: 10px; line-height: 1.35; }
  .name { color: var(--ink); font-weight: 500; }
  .hex { color: var(--ink-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#f7f1e8"></div><div class="meta"><div class="name">--paper</div><div class="hex">#f7f1e8 · warm cream</div></div></div>
    <div class="sw"><div class="chip" style="background:#f0e7d8"></div><div class="meta"><div class="name">--paper-tinted</div><div class="hex">#f0e7d8 · deeper cream</div></div></div>
    <div class="sw"><div class="chip" style="background:#ead8d0"></div><div class="meta"><div class="name">--paper-rose</div><div class="hex">#ead8d0 · dusty rose</div></div></div>
    <div class="sw"><div class="chip" style="background:#d8d4c8"></div><div class="meta"><div class="name">--rule</div><div class="hex">#d8d4c8</div></div></div>
  </div>
</body>
</html>
