<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--paper); }
  table { width: 100%; max-width: 640px; border-collapse: collapse; font-family: var(--font-sans); font-size: 13px; }
  thead th { text-align: left; border-bottom: 2px solid var(--drone); padding: 8px 10px; font-weight: 600; color: var(--drone); }
  tbody td { padding: 8px 10px; border-bottom: 1px solid var(--rule); vertical-align: top; color: var(--ink); }
  tbody tr:last-child td { background: var(--paper-tinted); border-bottom: none; }
  .mono { font-family: var(--font-mono); font-size: 12px; color: var(--ink-muted); }
</style>
</head>
<body>
  <table>
    <thead><tr><th>Agent</th><th>Difficulty</th><th>Status</th></tr></thead>
    <tbody>
      <tr><td>Claude Code</td><td>Native + Adapter</td><td class="mono">Export hook available</td></tr>
      <tr><td>Codex</td><td>Moderate</td><td class="mono">Fallback + prepare-turn</td></tr>
      <tr><td>Cursor</td><td>SQLite</td><td class="mono">Adapter available</td></tr>
      <tr><td><strong>Cline</strong></td><td>Unknown</td><td class="mono">Blocked</td></tr>
    </tbody>
  </table>
</body>
</html>
