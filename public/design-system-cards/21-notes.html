<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--paper); }
  .note {
    color: var(--ink-muted); font-size: 13px; line-height: 1.5;
    border-left: 3px solid var(--rule); padding: 6px 0 6px 16px; max-width: 620px;
    font-family: var(--font-sans); margin: 0 0 10px 0;
  }
  .note.accent { border-left-color: var(--drone); }
  .note.warn { border-left-color: var(--ochre); }
  .note strong { color: var(--ink); }
</style>
</head>
<body>
  <p class="note">Free for solo developers, internal use, research, and non-competing commercial use.</p>
  <p class="note accent"><strong>Renamed</strong> from <em>Continuo</em> to <em>Bourdon</em> on 2026-05-05; relicensed from MIT to BSL 1.1 on 2026-05-06.</p>
  <p class="note warn"><strong>Pre-alpha.</strong> Not ready for production use — built in the open as a spec-and-reference-implementation.</p>
</body>
</html>
