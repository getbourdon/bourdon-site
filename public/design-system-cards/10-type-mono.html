<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .inline-code { font-family: var(--font-mono); font-size: 14px; background: var(--paper-tinted); padding: 0.1em 0.35em; border-radius: 4px; color: var(--ink); }
  pre { margin: 0; background: var(--paper-tinted); border-left: 3px solid var(--drone); padding: 10px 14px; border-radius: 0 6px 6px 0; font-family: var(--font-mono); font-size: 12.5px; color: var(--ink); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="stack">
    <div><span class="inline-code">bourdon prepare-turn "..."</span> &nbsp;<span class="inline-code">~/.codex</span> &nbsp;<span class="inline-code">L0 → L6</span></div>
    <pre>$ bourdon serve --transport stdio
[bourdon] L6 federation library loaded · 5 agents · 188 entities</pre>
    <p class="meta">Geist Mono · inline 14px · block 12.5px · left-rule 3px --drone · tabular-nums</p>
  </div>
</body>
</html>
