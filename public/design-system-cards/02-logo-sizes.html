<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--paper); }
  .row { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item img { display: block; }
  .item .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <img src="../assets/bourdon-mark.svg" width="96" height="96">
      <span class="lbl">96px</span>
    </div>
    <div class="item">
      <img src="../assets/bourdon-mark.svg" width="64" height="64">
      <span class="lbl">64px</span>
    </div>
    <div class="item">
      <img src="../assets/bourdon-mark.svg" width="40" height="40">
      <span class="lbl">40px</span>
    </div>
    <div class="item">
      <img src="../assets/bourdon-mark.svg" width="32" height="32">
      <span class="lbl">32px nav</span>
    </div>
    <div class="item">
      <img src="../assets/bourdon-mark.svg" width="24" height="24">
      <span class="lbl">24px</span>
    </div>
    <div class="item">
      <img src="../assets/bourdon-mark-simple.svg" width="32" height="32">
      <span class="lbl">simple · 32px</span>
    </div>
    <div class="item">
      <img src="../assets/bourdon-mark-simple.svg" width="16" height="16">
      <span class="lbl">simple · 16px</span>
    </div>
  </div>
</body>
</html>
