<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--paper); }
  .wrap { display: flex; align-items: center; gap: 32px; }
  .lockup { display: flex; align-items: center; gap: 16px; }
  .mark { width: 64px; height: 64px; }
  .word {
    font-family: var(--font-sans);
    font-size: 44px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--drone);
    line-height: 1;
  }
  .sep { width: 1px; height: 64px; background: var(--rule); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--ink-muted); line-height: 1.6; }
  .meta b { color: var(--drone); font-weight: 600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <img class="mark" src="../assets/bourdon-mark.svg" alt="Bourdon mark">
      <span class="word">bourdon</span>
    </div>
    <div class="sep"></div>
    <div class="meta">
      <b>Six organ pipes</b> &nbsp;·&nbsp; the L0–L6 memory stack<br>
      <b>The tallest pipe</b> &nbsp;·&nbsp; the ascender of "b" + its bowl<br>
      Dusty rose <code>#c17c74</code> on cream paper
    </div>
  </div>
</body>
</html>
