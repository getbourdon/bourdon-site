<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--paper); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--paper-tinted); border: 1px solid var(--rule); width: 64px; height: 64px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); text-align: center; line-height: 1.3; }
  .meta b { color: var(--ink); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="meta"><b>--radius-sm</b><br>4 · tags/chips</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="meta"><b>--radius-md</b><br>8 · buttons</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="meta"><b>--radius-lg</b><br>12 · cards</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="meta"><b>--radius-xl</b><br>20 · hero</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="meta"><b>--radius-full</b><br>pill</div></div>
  </div>
</body>
</html>
