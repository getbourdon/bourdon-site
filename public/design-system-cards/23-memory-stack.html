<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--paper); }
  .stack { font-family: var(--font-mono); font-size: 12px; color: var(--ink); max-width: 640px; line-height: 1.6; }
  .layer { display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--rule); }
  .layer:last-child { border-bottom: none; }
  .num { color: var(--drone); font-weight: 600; font-size: 14px; }
  .label { color: var(--ink); }
  .desc { color: var(--ink-muted); font-size: 11px; }
  .L5, .L6 { background: var(--paper-tinted); margin: 0 -10px; padding-left: 10px; padding-right: 10px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="layer"><span class="num">L0</span><span class="label">Hot Cache</span><span class="desc">always loaded · ~3K tokens</span></div>
    <div class="layer"><span class="num">L1</span><span class="label">Entity Synopses</span><span class="desc">parallel-loaded on keyword hit</span></div>
    <div class="layer"><span class="num">L2</span><span class="label">Episodic Memory</span><span class="desc">async during human response</span></div>
    <div class="layer"><span class="num">L3</span><span class="label">Indexed History</span><span class="desc">on-demand searchable</span></div>
    <div class="layer"><span class="num">L4</span><span class="label">Raw Archive</span><span class="desc">verbatim history</span></div>
    <div class="layer L5"><span class="num">L5</span><span class="label">Agent Memory Manifest</span><span class="desc">federation projection</span></div>
    <div class="layer L6"><span class="num">L6</span><span class="label">Federation Library</span><span class="desc">aggregates all L5s · MCP</span></div>
  </div>
</body>
</html>
