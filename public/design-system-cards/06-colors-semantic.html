<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--paper); }
  .lead { font-family: var(--font-sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-muted); margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .pair { display: grid; grid-template-columns: 32px 1fr; gap: 8px; align-items: center; }
  .chip { width: 32px; height: 32px; border-radius: 8px; }
  .soft { width: 32px; height: 32px; border-radius: 8px; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .meta { font-family: var(--font-mono); font-size: 10px; line-height: 1.3; }
  .name { color: var(--ink); font-weight: 500; }
  .hex { color: var(--ink-muted); }
  .role { font-family: var(--font-display); font-weight: 300; font-style: normal; font-size: 14px; color: var(--drone); margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="lead">Semantic state — used sparingly</div>
  <div class="row">
    <div>
      <div class="role">recognized</div>
      <div class="stack">
        <div class="pair"><div class="chip" style="background:#4f6b50"></div><div class="meta"><div class="name">--moss</div><div class="hex">#4f6b50</div></div></div>
        <div class="pair"><div class="soft" style="background:#e7ede1"></div><div class="meta"><div class="name">--moss-soft</div><div class="hex">#e7ede1</div></div></div>
      </div>
    </div>
    <div>
      <div class="role">hydration</div>
      <div class="stack">
        <div class="pair"><div class="chip" style="background:#a47b3a"></div><div class="meta"><div class="name">--ochre</div><div class="hex">#a47b3a</div></div></div>
        <div class="pair"><div class="soft" style="background:#efe8d4"></div><div class="meta"><div class="name">--ochre-soft</div><div class="hex">#efe8d4</div></div></div>
      </div>
    </div>
    <div>
      <div class="role">descent</div>
      <div class="stack">
        <div class="pair"><div class="chip" style="background:#a8543a"></div><div class="meta"><div class="name">--clay</div><div class="hex">#a8543a</div></div></div>
        <div class="pair"><div class="soft" style="background:#f1e1d8"></div><div class="meta"><div class="name">--clay-soft</div><div class="hex">#f1e1d8</div></div></div>
      </div>
    </div>
  </div>
</body>
</html>
