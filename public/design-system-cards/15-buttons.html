<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px; background: var(--paper); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  button {
    font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    border-radius: 8px; padding: 9px 16px; cursor: pointer;
    border: 1px solid transparent;
    transition: background 180ms cubic-bezier(0.2,0,0,1), box-shadow 180ms cubic-bezier(0.2,0,0,1);
  }
  .primary { background: var(--drone); color: var(--paper); }
  .primary:hover { background: var(--drone-deep); }
  .primary:active { background: var(--drone-deep); box-shadow: inset 0 2px 4px rgba(0,0,0,0.12); }

  .secondary { background: var(--paper); color: var(--drone); border-color: var(--rule); }
  .secondary:hover { background: var(--paper-tinted); border-color: var(--rule-strong); }

  .ghost { background: transparent; color: var(--drone); }
  .ghost:hover { background: var(--paper-tinted); }

  .danger { background: var(--clay); color: var(--paper); }
  .danger:hover { background: #8e4530; }

  .small { font-size: 12px; padding: 6px 10px; border-radius: 6px; }
  .pill { border-radius: 999px; padding: 9px 18px; }
</style>
</head>
<body>
  <div class="row">
    <button class="primary">Install bourdon</button>
    <button class="secondary">View on GitHub</button>
    <button class="ghost">Cancel</button>
    <button class="danger">Revoke</button>
    <button class="primary pill">Get started →</button>
    <button class="secondary small">v0.7.0</button>
  </div>
</body>
</html>
