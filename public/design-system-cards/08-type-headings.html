<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 24px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 2px; }
  h1, h2, h3, h4 { margin: 0; padding: 0; }
  .row { display: grid; grid-template-columns: 1fr 96px; align-items: baseline; gap: 12px; border-bottom: 1px dashed var(--rule); padding: 4px 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); text-align: right; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><h1>How Bourdon differs</h1><span class="tok">h1 · 38.4</span></div>
    <div class="row"><h2>The thesis in one paragraph</h2><span class="tok">h2 · 27.2</span></div>
    <div class="row"><h3>Cross-account test</h3><span class="tok">h3 · 21.6</span></div>
    <div class="row"><h4>Adapter compatibility</h4><span class="tok">h4 · 18</span></div>
  </div>
</body>
</html>
